# Docker Compose definition for a single Raspberry Pi camera stream.
# Copy one of the sample .env files to `.env` before running.
version: "3.9"

services:
  camera_stream:
    container_name: ${CAMERA_NAME:-pi-camera}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    devices:
      - "${VIDEO_DEVICE:-/dev/video0}:${VIDEO_DEVICE:-/dev/video0}"
    network_mode: host
    restart: unless-stopped
    privileged: false
    # Helpful when debugging permissions.
    # extra_hosts:
    #   - "middleware:${DEST_IP}"
